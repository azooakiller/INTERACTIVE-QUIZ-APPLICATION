<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Makes the page look good on mobile phones -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>JS Mastery Quiz</title>

    <!-- Load a nice font from Google -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Connect our CSS file (controls how everything looks) -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!--
        MAIN WHITE CARD
        Everything lives inside this box.
    -->
    <div class="app-container">

        <!--
            HEADER
            Shows the title, a progress bar, and "1 of 10 Questions".
            Always visible while the quiz is running.
        -->
        <div class="quiz-header">
            <h1>JS Mastery Quiz</h1>

            <!-- Grey track; the purple fill grows as you answer questions -->
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <!-- Updated by JavaScript: "1 of 10 Questions" etc. -->
            <span class="question-count" id="question-count">1 of 10 Questions</span>
        </div>

        <!--
            QUIZ BOX
            Contains the timer, question text, and 4 answer buttons.
            Shown automatically when the page loads.
        -->
        <div class="quiz-box" id="quiz-box">

            <!-- 30-second countdown timer -->
            <div class="timer-container">
                <div class="timer-circle" id="timer-circle">
                    <span id="timer-text">30</span>
                </div>
                <!-- "Time's up!" message — hidden until time runs out -->
                <p class="timeout-msg" id="timeout-msg"></p>
            </div>

            <!-- The question (e.g. "What does DOM stand for?") -->
            <h2 id="question-text">Loading question...</h2>

            <!-- JavaScript adds the 4 answer buttons here automatically -->
            <div id="answer-buttons" class="btn-grid"></div>

            <!-- Hidden until the user picks an answer -->
            <button id="next-btn" class="next-btn">Next &#8594;</button>
        </div>

        <!--
            RESULT SCREEN
            Hidden during the quiz.
            Shown when all 10 questions are finished.
        -->
        <div class="result-box" id="result-box" style="display:none;">
            <div class="score-icon">&#x1F3C6;</div>
            <h2>Quiz Completed!</h2>
            <p>You scored <span id="score">0</span> out of <span id="total-questions">0</span></p>
            <p id="result-message" class="result-message"></p>
            <!-- Reloads the page so the quiz starts fresh -->
            <button class="restart-btn" onclick="location.reload()">Play Again</button>
        </div>

    </div><!-- end .app-container -->

    <!-- Connect our JavaScript file (controls how everything works) -->
    <script src="script.js"></script>

</body>
</html>
